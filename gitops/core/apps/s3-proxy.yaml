apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: s3-proxy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  sources:
    - repoURL: https://oxyno-zeta.github.io/helm-charts-v2/
      chart: s3-proxy
      targetRevision: 2.23.1
      helm:
        values: |
          envFrom:
            - secretRef:
                name: s3-proxy-credentials
            - secretRef:
                name: s3-proxy-dex-client
          ingress:
            enabled: false
          prometheus:
            serviceMonitor:
              enabled: true
          configFiles:
            config.yaml:
              log:
                format: text
                level: info
              metrics:
                disableRouterPath: false
              authProviders:
                oidc:
                  dex:
                    clientID: s3-proxy
                    clientSecret:
                      env: S3_PROXY_DEX_CLIENT_SECRET
                    issuerUrl: https://login.nce.wtf/dex/
                    redirectUrl: https://s3.nce.wtf/
                    scopes:
                      - openid
                      - profile
                      - groups
                    groupClaim: groups
              targets:
                oracle:
                  bucket:
                    name: tourenbuch
                    region: eu-frankfurt-1
                    s3Endpoint: https://frrwy4uskhkj.compat.objectstorage.eu-frankfurt-1.oci.customer-oci.com
                    credentials:
                      accessKey:
                        env: AWS_ACCESS_KEY_ID
                      secretKey:
                        env: AWS_SECRET_KEY_ID
                  mount:
                    path:
                      - /
                  resources:
                    - path: "/*"
                      methods:
                        - GET
                        - PUT
                        - DELETE
                      provider: dex
                      oidc:
                        authorizationAccesses:
                          - group: nce-acme:admin
    - repoURL: GIT_REPO_URL  # Replace with your repository URL
      targetRevision: HEAD
      path: gitops/core/s3-proxy
  destination:
    server: https://kubernetes.default.svc
    namespace: s3-proxy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
