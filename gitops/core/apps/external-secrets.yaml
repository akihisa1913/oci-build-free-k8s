# Deploy external-secrets before other components (dependency for secret management)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 1.2.1
      helm:
        values: |
          installCRDs: true
    - repoURL: GIT_REPO_URL  # Replace with your repository URL, e.g. https://github.com/YOUR_ORG/oci-build-free-k8s.git
      targetRevision: HEAD
      path: gitops/core/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
