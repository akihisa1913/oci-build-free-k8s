grafana.ini:
  app_mode: production
  server:
    domain: monitoring.<YOUR_DOMAIN>
    root_url: https://monitoring.<YOUR_DOMAIN>
  users:
    allow_sign_up: false
  auth:
    disable_login_form: true
  auth.generic_oauth:
    enabled: true
    name: Dex
    allow_sign_up: true
    client_id: $__file{/etc/secrets/dex_grafana_client/client-id}
    client_secret: $__file{/etc/secrets/dex_grafana_client/client-secret}
    scopes: openid profile email groups
    email_attribute_path: email
    auth_url: https://login.<YOUR_DOMAIN>/dex/auth
    token_url: https://login.<YOUR_DOMAIN>/dex/token
    api_url: https://login.<YOUR_DOMAIN>/dex/userinfo
    role_attribute_path: contains(groups[*], '<YOUR_GITHUB_ORG>:admin') && 'Admin' || 'Viewer'
extraSecretMounts:
  - name: dex-grafana-client
    secretName: dex-grafana-client
    defaultMode: 0440
    mountPath: /etc/secrets/dex_grafana_client
    readOnly: true
plugins:
  - oci-metrics-datasource
ingress:
  enabled: false
sidecar:
  dashboards:
    enabled: true
    logLevel: INFO
    searchNamespace: grafana
    label: grafana_dashboard
  datasources:
    enabled: true
    searchNamespace: grafana
