envFrom:
  - secretRef:
      name: dex-github-connector
  - secretRef:
      name: dex-grafana-client
  - secretRef:
      name: dex-s3-proxy-client
  - secretRef:
      name: dex-envoy-client
replicaCount: 2
https:
  enabled: false
ingress:
  enabled: false
config:
  issuer: https://login.<YOUR_DOMAIN>/dex/
  storage:
    type: kubernetes
    config:
      inCluster: true
  web:
    http: 0.0.0.0:5556
  telemetry:
    http: 0.0.0.0:5558
  staticClients:
    - name: Envoy
      IDEnv: envoy.client-id
      secretEnv: envoy.client-secret
      redirectURIs:
        - https://storage.<YOUR_DOMAIN>/oauth2/callback
        - https://prometheus.<YOUR_DOMAIN>/oauth2/callback
    - name: S3Proxy
      IDEnv: s3proxy.client-id
      secretEnv: s3proxy.client-secret
      redirectURIs:
        - https://s3.<YOUR_DOMAIN>/auth/dex/callback
    - name: Grafana
      IDEnv: grafana.client-id
      secretEnv: grafana.client-secret
      redirectURIs:
        - https://monitoring.<YOUR_DOMAIN>/login/generic_oauth
  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: https://login.<YOUR_DOMAIN>/dex/callback
        orgs:
          - name: <YOUR_GITHUB_ORG>
            teams:
              - admin
              - zuschauer
        loadAllGroups: false
  enablePasswordDB: false
